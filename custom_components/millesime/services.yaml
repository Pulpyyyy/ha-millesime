add_floor:
  name: Ajouter un étage
  description: Ajoute un nouvel étage à la cave Millésime.
  fields:
    name:
      name: Nom de l'étage
      description: Nom de l'étage (ex. "Bordeaux", "Bourgogne").
      required: false
      selector:
        text:
    slots:
      name: Nombre d'emplacements
      description: Nombre total d'emplacements sur cet étage.
      required: false
      default: 12
      selector:
        number:
          min: 1
          max: 100
    layout:
      name: Disposition
      description: Disposition des bouteilles sur l'étage.
      required: false
      default: side_by_side
      selector:
        select:
          options:
            - label: "Côte à côte"
              value: side_by_side
            - label: "Tête bêche"
              value: alternating
    rows:
      name: Rangées
      required: false
      default: 2
      selector:
        number:
          min: 1
          max: 20
    columns:
      name: Colonnes
      required: false
      default: 6
      selector:
        number:
          min: 1
          max: 20

remove_floor:
  name: Supprimer un étage
  description: Supprime un étage et toutes ses bouteilles.
  fields:
    floor_id:
      name: ID de l'étage
      required: true
      selector:
        text:

add_bottle:
  name: Ajouter une bouteille
  description: Ajoute une bouteille à un emplacement de la cave.
  fields:
    floor_id:
      name: ID de l'étage
      required: true
      selector:
        text:
    slot:
      name: Emplacement
      description: Numéro de l'emplacement (0-indexé).
      required: true
      selector:
        number:
          min: 0
          max: 99
    name:
      name: Nom du vin
      required: true
      selector:
        text:
    vintage:
      name: Millésime
      required: false
      selector:
        text:
    type:
      name: Type de vin
      required: false
      default: red
      selector:
        select:
          options:
            - label: "Rouge"
              value: red
            - label: "Blanc"
              value: white
            - label: "Rosé"
              value: rose
            - label: "Effervescent"
              value: sparkling
            - label: "Doux/Liquoreux"
              value: dessert
    appellation:
      name: Appellation
      required: false
      selector:
        text:
    producer:
      name: Producteur
      required: false
      selector:
        text:
    price:
      name: Prix (€)
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 10000
          step: 0.5
    quantity:
      name: Quantité
      required: false
      default: 1
      selector:
        number:
          min: 1
          max: 50
    drink_from:
      name: À boire à partir de
      required: false
      selector:
        text:
    drink_until:
      name: À boire avant
      required: false
      selector:
        text:
    aromas:
      name: Arômes
      required: false
      selector:
        object:
    pairings:
      name: Accords mets-vins
      required: false
      selector:
        object:
    notes:
      name: Notes de dégustation
      required: false
      selector:
        text:
          multiline: true
    rating:
      name: Note (0-100)
      required: false
      default: 0
      selector:
        number:
          min: 0
          max: 100
    image_url:
      name: URL de l'image
      required: false
      selector:
        text:
    added_date:
      name: Date d'ajout
      required: false
      selector:
        text:

remove_bottle:
  name: Retirer une bouteille
  description: Retire une bouteille de la cave.
  fields:
    bottle_id:
      name: ID de la bouteille
      required: true
      selector:
        text:

update_bottle:
  name: Mettre à jour une bouteille
  description: Met à jour les informations d'une bouteille.
  fields:
    bottle_id:
      name: ID de la bouteille
      required: true
      selector:
        text:
    name:
      name: Nom du vin
      required: false
      selector:
        text:
    price:
      name: Prix (€)
      required: false
      selector:
        number:
          min: 0
          max: 10000
    notes:
      name: Notes
      required: false
      selector:
        text:
          multiline: true
    rating:
      name: Note
      required: false
      selector:
        number:
          min: 0
          max: 100

get_cellar_data:
  name: Récupérer les données
  description: Déclenche un événement avec toutes les données Millésime (pour le frontend).
