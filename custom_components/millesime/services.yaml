add_rack:
  name: Ajouter un casier
  description: Ajoute un casier à la cave. (add_floor reste accepté en alias déprécié, ainsi que rows pour shelves.)
  fields:
    name:
      description: Nom du casier
      example: "Bordeaux"
    columns:
      description: Nombre de colonnes
      example: 8
    shelves:
      description: Nombre d'étagères
      example: 2
    layout:
      description: "Disposition : side_by_side ou alternating"
      example: "side_by_side"
    style:
      description: "Apparence (objet) : material (chene|noyer|merisier|grise|wenge|fer), posts/feet/cross_braces/roof (booléens), accent (couleur CSS). Clés absentes = automatique."
      example: '{"material": "fer", "roof": true}'

update_rack:
  name: Modifier un casier
  description: Modifie un casier existant. (update_floor, floor_id et rows restent acceptés en alias dépréciés.)
  fields:
    rack_id:
      description: ID du casier
      required: true
    name:
      description: Nouveau nom
    columns:
      description: Nombre de colonnes
    shelves:
      description: Nombre d'étagères
    layout:
      description: Disposition
    style:
      description: "Apparence (objet) : material (chene|noyer|merisier|grise|wenge|fer), posts/feet/cross_braces/roof (booléens), accent (couleur CSS). Objet vide = retour au style automatique."
      example: '{"material": "noyer", "feet": true}'

remove_rack:
  name: Supprimer un casier
  description: Supprime un casier et ses bouteilles. (remove_floor et floor_id restent acceptés en alias dépréciés.)
  fields:
    rack_id:
      description: ID du casier
      required: true

add_bottle:
  name: Ajouter une bouteille
  description: Ajoute une bouteille à la cave.
  fields:
    rack_id:
      description: ID du casier
      required: true
    slot:
      description: Numéro d'emplacement
      required: true
    name:
      description: Nom du vin
      required: true
    vintage:
      description: Millésime (année)
    type:
      description: "Type : red, white, rose, sparkling, dessert"
    appellation:
      description: Appellation
    region:
      description: Région
    producer:
      description: Producteur
    country:
      description: Pays
    price:
      description: Prix en euros
    quantity:
      description: Quantité
    drink_from:
      description: À boire à partir de (année)
    drink_until:
      description: À boire avant (année)
    notes:
      description: Notes personnelles
    tasting_notes:
      description: Notes de dégustation
    food_pairing:
      description: Accords mets-vins
    event:
      description: "Événement : no_touch, keep, special, drink, table"
    vivino_rating:
      description: Note /5
    image_url:
      description: URL de l'image
    vivino_url:
      description: Lien Vivino

update_bottle:
  name: Modifier une bouteille
  description: Modifie une bouteille existante.
  fields:
    bottle_id:
      description: ID de la bouteille
      required: true
    rack_id:
      description: ID du casier de destination (déplacement)
    slot:
      description: Numéro d'emplacement de destination (déplacement)
    name:
      description: Nom du vin
    vintage:
      description: Millésime
    type:
      description: Type de vin
    appellation:
      description: Appellation
    region:
      description: Région
    producer:
      description: Producteur
    country:
      description: Pays
    price:
      description: Prix
    quantity:
      description: Quantité
    drink_from:
      description: À boire à partir de
    drink_until:
      description: À boire avant
    notes:
      description: Notes personnelles
    tasting_notes:
      description: Notes de dégustation
    food_pairing:
      description: Accords mets-vins
    event:
      description: Événement
    vivino_rating:
      description: Note /5
    image_url:
      description: URL image
    vivino_url:
      description: Lien Vivino

remove_bottle:
  name: Retirer une bouteille
  description: Retire une bouteille de la cave.
  fields:
    bottle_id:
      description: ID de la bouteille
      required: true

rename_cellar:
  name: Renommer la cave
  description: Change le nom de la cave.
  fields:
    name:
      description: Nouveau nom
      required: true

duplicate_bottle:
  name: Dupliquer une bouteille
  description: Duplique une bouteille vers un autre emplacement.
  fields:
    bottle_id:
      description: ID de la bouteille source
      required: true
    rack_id:
      description: ID du casier de destination
    slot:
      description: Emplacement de destination

value_snapshot:
  name: Enregistrer la valeur
  description: Enregistre la valeur actuelle de la cave dans l'historique.
  fields: {}

add_wine:
  name: Ajouter un vin
  description: Crée un vin avec un premier emplacement. Mêmes champs qu'add_bottle (sans quantity).
  fields:
    rack_id:
      description: ID du casier
      required: true
    slot:
      description: Numéro d'emplacement
      required: true
    name:
      description: Nom du vin
      required: true
    size:
      description: "Format de la bouteille (défaut : 75cl ; ex. : 150cl)"
    favorite:
      description: Coup de cœur (booléen)
    slot_comment:
      description: Commentaire propre à cette bouteille (emplacement)
    added_date:
      description: Date d'ajout (YYYY-MM-DD, défaut aujourd'hui)

update_wine:
  name: Modifier un vin
  description: Met à jour les métadonnées d'un vin (tous ses emplacements).
  fields:
    wine_id:
      description: ID du vin
      required: true

remove_wine:
  name: Supprimer un vin
  description: Supprime un vin et tous ses emplacements.
  fields:
    wine_id:
      description: ID du vin
      required: true

add_slot:
  name: Ajouter un emplacement
  description: Ajoute un emplacement (exemplaire) à un vin existant.
  fields:
    wine_id:
      description: ID du vin
      required: true
    rack_id:
      description: ID du casier
      required: true
    slot:
      description: Numéro d'emplacement
      required: true
    comment:
      description: Commentaire propre à cette bouteille
    size:
      description: "Format propre à cette bouteille (sinon celui du vin ; ex. : 150cl)"

update_slot:
  name: Modifier une bouteille
  description: Met à jour le format et/ou le commentaire d'une bouteille (emplacement) sans la déplacer. Champ vidé → retour à la valeur du vin.
  fields:
    wine_id:
      description: ID du vin
      required: true
    slot_idx:
      description: Index de l'emplacement (0 = premier)
    size:
      description: Format de cette bouteille (ex. 150cl)
    comment:
      description: Commentaire de cette bouteille

move_slot:
  name: Déplacer un emplacement
  description: Déplace un emplacement d'un vin vers une nouvelle position.
  fields:
    wine_id:
      description: ID du vin
      required: true
    slot_idx:
      description: Index de l'emplacement à déplacer (0 = premier)
    rack_id:
      description: ID du casier de destination
      required: true
    slot:
      description: Numéro d'emplacement de destination
      required: true

remove_slot:
  name: Retirer un emplacement
  description: Retire un emplacement d'un vin. Supprime le vin si c'était le dernier.
  fields:
    wine_id:
      description: ID du vin
      required: true
    slot_idx:
      description: Index de l'emplacement à retirer (0 = premier)

drink_bottle:
  name: Marquer comme bue
  description: Retire un emplacement de la cave et archive le vin au journal de dégustation.
  fields:
    wine_id:
      description: ID du vin (bottle_id accepté en alias)
      required: true
    slot_idx:
      description: Index de l'emplacement bu (0 = premier)
    rating:
      description: Note personnelle /5
    comment:
      description: Commentaire de dégustation
    drunk_date:
      description: Date de dégustation (YYYY-MM-DD)

delete_tasting:
  name: Supprimer une dégustation
  description: Supprime une entrée du journal de dégustation.
  fields:
    tasting_id:
      description: ID de l'entrée du journal
      required: true

refresh_wines:
  name: Rafraîchir les fiches (Gemini)
  description: >-
    Fusionne les vins en doublon (même nom, millésime et type — les emplacements
    sont regroupés), puis complète les champs vides de chaque fiche via Gemini
    (fallback Open Food Facts). Les données déjà saisies ne sont jamais écrasées,
    sauf le prix si update_prices est activé.
  fields:
    update_prices:
      description: Mettre à jour le prix de chaque vin avec le prix moyen constaté par Gemini (écrase le prix existant). Désactivé par défaut.
      example: true

import_vinotag:
  name: Importer une cave Vinotag
  description: >-
    Importe le fichier millesime_import_vinotag.csv (export CSV Vinotag) depuis le
    dossier de configuration de Home Assistant. Les bouteilles sont placées
    automatiquement dans les premiers emplacements libres (un casier « Import » est
    créé si la capacité manque), le prix retenu est la valeur actuelle, et le
    fichier est effacé après un import réussi.
  fields: {}
