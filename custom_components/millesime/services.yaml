add_floor:
  name: Ajouter un étage
  description: Ajoute un étage à la cave.
  fields:
    name:
      description: Nom de l'étage
      example: "Bordeaux"
    columns:
      description: Nombre de colonnes
      example: 8
    rows:
      description: Nombre de rangées
      example: 2
    layout:
      description: "Disposition : side_by_side ou alternating"
      example: "side_by_side"

update_floor:
  name: Modifier un étage
  description: Modifie un étage existant.
  fields:
    floor_id:
      description: ID de l'étage
      required: true
    name:
      description: Nouveau nom
    columns:
      description: Nombre de colonnes
    rows:
      description: Nombre de rangées
    layout:
      description: Disposition

remove_floor:
  name: Supprimer un étage
  description: Supprime un étage et ses bouteilles.
  fields:
    floor_id:
      description: ID de l'étage
      required: true

add_bottle:
  name: Ajouter une bouteille
  description: Ajoute une bouteille à la cave.
  fields:
    floor_id:
      description: ID de l'étage
      required: true
    slot:
      description: Numéro d'emplacement
      required: true
    name:
      description: Nom du vin
      required: true
    vintage:
      description: Millésime (année)
    type:
      description: "Type : red, white, rose, sparkling, dessert"
    appellation:
      description: Appellation
    region:
      description: Région
    producer:
      description: Producteur
    country:
      description: Pays
    price:
      description: Prix en euros
    quantity:
      description: Quantité
    drink_from:
      description: À boire à partir de (année)
    drink_until:
      description: À boire avant (année)
    notes:
      description: Notes personnelles
    tasting_notes:
      description: Notes de dégustation
    food_pairing:
      description: Accords mets-vins
    event:
      description: "Événement : no_touch, keep, special, drink, table"
    vivino_rating:
      description: Note /5
    image_url:
      description: URL de l'image
    vivino_url:
      description: Lien Vivino

update_bottle:
  name: Modifier une bouteille
  description: Modifie une bouteille existante.
  fields:
    bottle_id:
      description: ID de la bouteille
      required: true
    name:
      description: Nom du vin
    vintage:
      description: Millésime
    type:
      description: Type de vin
    appellation:
      description: Appellation
    region:
      description: Région
    producer:
      description: Producteur
    country:
      description: Pays
    price:
      description: Prix
    quantity:
      description: Quantité
    drink_from:
      description: À boire à partir de
    drink_until:
      description: À boire avant
    notes:
      description: Notes personnelles
    tasting_notes:
      description: Notes de dégustation
    food_pairing:
      description: Accords mets-vins
    event:
      description: Événement
    vivino_rating:
      description: Note /5
    image_url:
      description: URL image
    vivino_url:
      description: Lien Vivino

remove_bottle:
  name: Retirer une bouteille
  description: Retire une bouteille de la cave.
  fields:
    bottle_id:
      description: ID de la bouteille
      required: true

rename_cellar:
  name: Renommer une cave
  description: Change le nom d'une cave (la première cave si cellar_id est omis).
  fields:
    cellar_id:
      description: ID de la cave (optionnel, première cave par défaut)
    name:
      description: Nouveau nom
      required: true

add_cellar:
  name: Ajouter une cave
  description: Crée une nouvelle cave vide dans l'instance.
  fields:
    name:
      description: Nom de la cave
      example: "Cave du garage"

remove_cellar:
  name: Supprimer une cave
  description: Supprime une cave vide (refusé si elle contient des casiers ou si c'est la dernière).
  fields:
    cellar_id:
      description: ID de la cave
      required: true

add_rack:
  name: Ajouter un casier
  description: Ajoute un casier dans une cave.
  fields:
    cellar_id:
      description: ID de la cave (optionnel, première cave par défaut)
    name:
      description: Nom du casier
      example: "Bordeaux"
    columns:
      description: Nombre de colonnes
      example: 8
    shelves:
      description: Nombre d'étagères
      example: 2
    layout:
      description: "Disposition : side_by_side, alternating, alternating_2d, quinconce, semi_lying ou stacked"
      example: "side_by_side"
    levels:
      description: "Niveaux de superposition (2 à 4) — uniquement pour la disposition stacked"
      example: 3
    orientation:
      description: "Sens de départ : punt (piqûre devant) ou neck (goulot devant)"

update_rack:
  name: Modifier un casier
  description: Modifie un casier existant (recherché dans toutes les caves).
  fields:
    rack_id:
      description: ID du casier
      required: true
    name:
      description: Nouveau nom
    columns:
      description: Nombre de colonnes
    shelves:
      description: Nombre d'étagères
    layout:
      description: Disposition
    levels:
      description: "Niveaux de superposition (2 à 4, disposition stacked)"
    orientation:
      description: Sens de départ

swap_slots:
  name: Permuter deux emplacements
  description: Échange atomiquement les positions de deux bouteilles (fonctionne cave pleine).
  fields:
    wine_id_a:
      description: ID du premier vin
      required: true
    slot_idx_a:
      description: Index de l'emplacement dans les slots du premier vin (défaut 0)
    wine_id_b:
      description: ID du second vin
      required: true
    slot_idx_b:
      description: Index de l'emplacement dans les slots du second vin (défaut 0)

remove_rack:
  name: Supprimer un casier
  description: Supprime un casier et retire ses bouteilles.
  fields:
    rack_id:
      description: ID du casier
      required: true

duplicate_bottle:
  name: Dupliquer une bouteille
  description: Duplique une bouteille vers un autre emplacement.
  fields:
    bottle_id:
      description: ID de la bouteille source
      required: true
    floor_id:
      description: ID de l'étage de destination
    slot:
      description: Emplacement de destination

value_snapshot:
  name: Enregistrer la valeur
  description: Enregistre la valeur actuelle de chaque cave dans son historique.
  fields: {}

drink_bottle:
  name: Marquer comme bue
  description: Retire une bouteille de la cave et l'ajoute au journal de dégustation.
  fields:
    bottle_id:
      description: ID de la bouteille
      required: true
    rating:
      description: Note personnelle /5
    comment:
      description: Commentaire de dégustation
    drunk_date:
      description: Date de dégustation (YYYY-MM-DD)

delete_tasting:
  name: Supprimer une dégustation
  description: Supprime une entrée du journal de dégustation.
  fields:
    tasting_id:
      description: ID de l'entrée du journal
      required: true
